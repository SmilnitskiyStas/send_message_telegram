<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Дашборд — Адмін</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<style>
  body{background:#f0f2f5}
  .sidebar{width:220px;min-height:100vh;background:#16213e;position:fixed;top:0;left:0;padding:20px 0}
  .sidebar .brand{color:#fff;font-weight:700;font-size:1rem;padding:0 20px 20px;border-bottom:1px solid #ffffff22;margin-bottom:12px}
  .sidebar .nav-link{padding:10px 20px;font-size:.9rem;border-radius:0}
  .sidebar .nav-link.active{background:#0f3460;color:#fff!important;border-left:3px solid #e94560}
  .main{margin-left:220px;padding:28px}
  .stat-card{border:none;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
</style>
</head>
<body>
<div class="sidebar">
  <div class="brand">🤖 Bot Admin</div>
  <nav id="sidebar-nav" class="nav flex-column"></nav>
  <div class="mt-auto px-3" style="position:absolute;bottom:20px;width:100%">
    <button class="btn btn-outline-danger btn-sm w-100" onclick="logout()">Вийти</button>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <h4 class="mb-0 fw-bold">📊 Дашборд</h4>
    <button class="btn btn-warning" onclick="openTestModal()">🧪 Тест відправки</button>
  </div>
  <div class="row g-3 mb-4" id="stats"></div>
  <div class="card stat-card">
    <div class="card-header fw-semibold">Останні сповіщення</div>
    <div class="card-body p-0">
      <table class="table table-hover mb-0" id="logsTable">
        <thead class="table-light"><tr>
          <th>Час</th><th>Тема</th><th>Магазин</th><th>Відправлено</th><th>Статус</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>
<!-- Модалка тестової відправки -->
<div class="modal fade" id="testModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">🧪 Тестова відправка сповіщення</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted small mb-3">Відправить тестове повідомлення через Telegram всім активним користувачам обраного магазину.</p>
        <div class="mb-3">
          <label class="form-label fw-semibold">Магазин</label>
          <select class="form-select" id="testStoreSelect">
            <option value="">— Перший доступний (авто) —</option>
          </select>
        </div>
        <div id="testResult" class="d-none"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
        <button class="btn btn-warning" id="testSendBtn" onclick="sendTest()">🚀 Відправити тест</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="_layout.js"></script>
<script>
let testModal;
checkAuth().then(() => {
  renderSidebar('Дашборд');
  loadStats();
  loadLogs();
  testModal = new bootstrap.Modal('#testModal');
  loadStoresForTest();
});

async function loadStoresForTest() {
  const stores = await fetch('/api/stores').then(r => r.json());
  const sel = document.getElementById('testStoreSelect');
  stores.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = `${s.name} (код: ${s.code})`;
    sel.appendChild(opt);
  });
}

function openTestModal() {
  document.getElementById('testResult').className = 'd-none';
  document.getElementById('testResult').innerHTML = '';
  testModal.show();
}

async function sendTest() {
  const storeId = document.getElementById('testStoreSelect').value;
  const btn = document.getElementById('testSendBtn');
  const result = document.getElementById('testResult');

  btn.disabled = true;
  btn.textContent = '⏳ Відправляємо...';
  result.className = 'd-none';

  try {
    const body = storeId ? { store_id: parseInt(storeId) } : {};
    const res = await fetch('/api/test/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();

    if (data.ok) {
      result.className = 'alert alert-success';
      result.innerHTML = `✅ ${data.message}`;
    } else {
      result.className = 'alert alert-danger';
      result.innerHTML = `❌ Помилка: ${data.error}`;
    }
  } catch (e) {
    result.className = 'alert alert-danger';
    result.innerHTML = '❌ Помилка з\'єднання';
  }

  btn.disabled = false;
  btn.textContent = '🚀 Відправити тест';
}

async function loadStats() {
  const [stores, users, logs] = await Promise.all([
    fetch('/api/stores').then(r=>r.json()),
    fetch('/api/users').then(r=>r.json()),
    fetch('/api/logs?limit=1').then(r=>r.json()),
  ]);
  const security = users.filter(u => u.role === 'security' && u.is_active).length;
  const registered = users.filter(u => u.telegram_chat_id).length;
  const cards = [
    { label:'Магазини',   value: stores.length,   color:'primary',  icon:'🏪' },
    { label:'Користувачі',value: users.length,    color:'success',  icon:'👥' },
    { label:'Безпека',    value: security,         color:'warning',  icon:'🛡' },
    { label:'Підключено', value: registered,       color:'info',     icon:'✅' },
    { label:'Сповіщень',  value: logs.total || 0, color:'secondary',icon:'📨' },
  ];
  document.getElementById('stats').innerHTML = cards.map(c=>`
    <div class="col-6 col-md-4 col-lg-2">
      <div class="card stat-card text-center p-3">
        <div style="font-size:1.8rem">${c.icon}</div>
        <div class="fs-3 fw-bold text-${c.color}">${c.value}</div>
        <div class="text-muted small">${c.label}</div>
      </div>
    </div>`).join('');
}

async function loadLogs() {
  const data = await fetch('/api/logs?limit=10').then(r=>r.json());
  const tbody = document.querySelector('#logsTable tbody');
  tbody.innerHTML = data.rows.map(l => {
    const ids = JSON.parse(l.users_notified || '[]');
    const badge = l.status === 'sent' ? 'success' : l.status === 'no_recipients' ? 'secondary' : 'danger';
    return `<tr>
      <td class="text-nowrap">${toKyivTime(l.created_at)}</td>
      <td>${l.mail_subject||''}</td>
      <td>${l.store_name||'—'}</td>
      <td>${ids.length}</td>
      <td><span class="badge bg-${badge}">${l.status}</span></td>
    </tr>`;
  }).join('') || '<tr><td colspan="5" class="text-center text-muted py-3">Немає даних</td></tr>';
}
</script>
</body>
</html>
