<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Вхід — Адмін панель</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<style>
  body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { border: none; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.3); min-width: 360px; }
  .card-header { background: #16213e; color: #fff; border-radius: 12px 12px 0 0 !important; text-align: center; padding: 24px; font-size: 1.2rem; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">🔐 Mail → Telegram Bot</div>
  <div class="card-body p-4">
    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label fw-semibold">Пароль адміністратора</label>
        <input type="password" class="form-control form-control-lg" id="password" placeholder="Введіть пароль" autofocus>
      </div>
      <div id="error" class="alert alert-danger d-none"></div>
      <button type="submit" class="btn btn-primary w-100 btn-lg">Увійти</button>
    </form>
  </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const password = document.getElementById('password').value;
  const err = document.getElementById('error');
  err.classList.add('d-none');
  const res = await fetch('/api/auth/login', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ password })
  });
  if (res.ok) { window.location.href = '/admin/'; }
  else {
    const data = await res.json();
    err.textContent = data.error || 'Помилка';
    err.classList.remove('d-none');
  }
});
</script>
</body>
</html>
